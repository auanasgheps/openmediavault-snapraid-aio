version: "1.0"
type: component
data:
  name: omv-services-snapraidaio-configs-form-page
  type: formPage
  config:
    request:
      service: SnapRaidAio
      get:
        method: getConfig
        params:
          uuid: "{{ _routeParams.uuid }}"
      post:
        method: setConfig
    fields:
      - type: confObjUuid
      - type: hint
        hintType: info
        text: _("For full documentation and configuration reference, see the <a href='https://github.com/auanasgheps/snapraid-aio-script' target='_blank'>SnapRAID AIO Script project page</a>.")
      - type: hint
        hintType: info
        text: _("If the array list is empty, install and configure SnapRAID via the OMV SnapRAID plugin first, then return here.")
      - type: select
        name: snapraid_conf
        label: _("SnapRAID array")
        value: ""
        valueField: path
        textField: label
        store:
          proxy:
            service: SnapRaidAio
            get:
              method: enumerateConfigFiles

      - type: divider
        title: _("Email Notifications")
      - type: checkbox
        name: email_notifications
        label: _("Enable email notifications")
        hint: _("Sends the report via the email address configured in OMV's notification settings.")
        value: false
      - type: textInput
        name: email_sender
        label: _("Sender address")
        value: ""
        readonly: true
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: email_notifications
      - type: textInput
        name: email_receiver
        label: _("Receiver address")
        value: ""
        readonly: true
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: email_notifications

      - type: divider
        title: _("Healthchecks")
      - type: container
        fields:
          - type: checkbox
            name: healthchecks
            label: _("Enable Healthchecks.io")
            hint: _("Reports script errors to Healthchecks.io. Any warning will be reported as a failure.")
            value: false
          - type: textInput
            name: healthchecks_id
            label: _("Healthchecks UUID")
            value: ""
            hint: _("Enter the UUID only, not the full URL.")
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: healthchecks
          - type: textInput
            name: healthchecks_url
            label: _("Healthchecks URL")
            value: "https://hc-ping.com/"
            hint: _("Only change if using a self-hosted Healthchecks.io instance. Must include the trailing slash.")
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: healthchecks

      - type: divider
        title: _("Apprise Notifications")
      - type: container
        fields:
          - type: checkbox
            name: apprise
            label: _("Enable Apprise")
            hint: _("Apprise can send notifications to Telegram, Discord, Slack, Gotify, and many other services. Unlike native email, Apprise can attach the full report when a warning is issued. See the <a href='https://appriseit.com/services/' target='_blank'>supported services list</a> for all available integrations.")
            value: false
          - type: tagInput
            name: apprise_url
            label: _("Apprise URLs")
            value: ""
            hint: _("Enter each Apprise URL and press Enter to add it. Multiple services are supported. Refer to the <a href='https://appriseit.com/services/' target='_blank'>Apprise services page</a> for URL format and configuration examples.")
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: apprise
          - type: checkbox
            name: apprise_attach
            label: _("Attach report on warnings")
            hint: _("Attach the full report to the notification when a warning is issued. Not all services support attachments.")
            value: false
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: apprise

      - type: divider
        title: _("Apprise Email Notifications")
      - type: container
        fields:
          - type: checkbox
            name: apprise_email
            label: _("Enable Apprise email")
            hint: _("Uses Apprise to send email. Does not require the Apprise feature above. See the <a href='https://appriseit.com/services/email/' target='_blank'>Apprise email documentation</a> for SMTP and provider setup.")
            value: false
          - type: textInput
            name: apprise_email_url
            label: _("Apprise Email URL")
            value: ""
            hint: _("Apprise email service URL. Refer to the <a href='https://appriseit.com/services/email/' target='_blank'>Apprise email documentation</a> for SMTP and provider URL format examples.")
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: apprise_email
          - type: checkbox
            name: apprise_email_attach
            label: _("Attach report on warnings")
            hint: _("Attach the full report to the email when a warning is issued.")
            value: false
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: apprise_email

      - type: textArea
        name: hook_notification
        label: _("Custom notification hook")
        value: ""
        monospaced: true
        rows: 2
        hint: _("Legacy option, superseded by Apprise. Script or command called instead of the default email. SUBJECT and BODY are passed as parameters.")

      - type: divider
        title: _("Sync thresholds")
      - type: numberInput
        name: del_threshold
        label: _("Delete threshold")
        value: 500
        min: 0
        hint: _("Abort sync if more than N files were deleted since last run. 0 disables.")
      - type: numberInput
        name: up_threshold
        label: _("Update threshold")
        value: 500
        min: 0
        hint: _("Abort sync if more than N files were updated since last run. 0 disables.")
      - type: numberInput
        name: add_del_threshold
        label: _("Add/Delete ratio threshold")
        value: 0
        min: 0
        step: 0.01
        hint: _("Allow sync even if delete threshold is exceeded, if enough files were also added. 0 disables. Example&colon; 0.76 means at least 76% of deleted files must have a matching add.")
      - type: numberInput
        name: sync_warn_threshold
        label: _("Sync warning threshold")
        value: -1
        hint: _("Number of times a threshold warning is issued before forcing a sync anyway. 0 = always force, -1 = never force.")

      - type: divider
        title: _("Scrub settings")
      - type: numberInput
        name: scrub_percent
        label: _("Scrub percentage")
        value: 5
        min: 0
        max: 100
        hint: _("Percentage of the array to verify per run.")
      - type: numberInput
        name: scrub_age
        label: _("Scrub age (days)")
        value: 10
        min: 0
        hint: _("Only scrub blocks that have not been verified in the last N days.")
      - type: checkbox
        name: scrub_new
        label: _("Scrub new blocks after sync")
        value: false
      - type: numberInput
        name: scrub_delayed_run
        label: _("Scrub every N runs")
        value: 0
        min: 0
        hint: _("Run scrub only every N script executions. 0 = scrub every time.")

      - type: divider
        title: _("SnapRAID options")
      - type: checkbox
        name: prehash
        label: _("Pre-hash data")
        value: true
        hint: _("Read data twice before syncing to detect silent read errors. Recommended.")
      - type: checkbox
        name: force_zero
        label: _("Sync zero-sized files")
        value: false
        hint: _("SnapRAID skips zero-sized files by default. Enable to include them.")
      - type: checkbox
        name: spindown
        label: _("Spin down disks when done")
        value: false
        hint: _("Spin down disks after the script completes using hd-idle.")

      - type: checkbox
        name: verbosity
        label: _("Verbose output in notification")
        value: false
        hint: _("Include full SnapRAID output in the notification. Not recommended — may produce very large messages.")

      - type: numberInput
        name: retention_days
        label: _("Log retention (days)")
        value: 0
        min: 0
        hint: _("Days to keep log files. 0 keeps logs forever.")
      - type: textInput
        name: snapraid_log_dir
        label: _("SnapRAID log directory")
        value: ""
        hint: _("Directory for log files. Leave empty to use the home directory.")

      - type: container
        fields:
          - type: checkbox
            name: smart_log
            label: _("Log SMART data")
            value: true
          - type: checkbox
            name: smart_log_notify
            label: _("Include SMART data in notification")
            value: false
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: smart_log

      - type: container
        fields:
          - type: checkbox
            name: snap_status
            label: _("Log SnapRAID status")
            value: false
          - type: checkbox
            name: snap_status_notify
            label: _("Include status in notification")
            value: false
            modifiers:
              - type: disabled
                constraint:
                  operator: falsy
                  arg0:
                    prop: snap_status

      - type: textInput
        name: ignore_pattern
        label: _("Ignore pattern")
        value: ""
        hint: _("Advanced. Space-separated glob patterns to exclude from diff counts. Misuse will leave parity out of sync without warning — use SnapRAID's exclude configuration for files that change often. Example&colon; *.tmp /var/cache/* */backup/*")

      - type: divider
        title: _("Docker and service management")
      - type: checkbox
        name: manage_services
        label: _("Manage Docker containers / services")
        value: false
      - type: select
        name: docker_mode
        label: _("Docker mode")
        value: 1
        store:
          data:
            - [1, _("Pause / unpause")]
            - [2, _("Stop / restart")]
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: manage_services
      - type: select
        name: services
        label: _("Docker container list")
        multiple: true
        valueField: name
        textField: name
        store:
          proxy:
            service: SnapRaidAio
            get:
              method: getContainers
          sorters:
            dir: asc
            prop: name
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: manage_services
      - type: numberInput
        name: docker_delay
        label: _("Service start delay (seconds)")
        value: 0
        min: 0
        hint: _("Seconds to wait after restarting services before continuing.")
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: manage_services

      - type: divider
        title: _("Custom hooks")
      - type: checkbox
        name: custom_hook
        label: _("Enable custom hooks")
        value: false

      - type: textInput
        name: before_hook_name
        label: _("Before hook name")
        value: ""
        hint: _("Display name shown in the log output.")
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: custom_hook
      - type: textArea
        name: before_hook_cmd
        label: _("Before hook command")
        monospaced: true
        rows: 2
        value: ""
        hint: _("Shell command or script path. Runs before SnapRAID operations start.")
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: custom_hook

      - type: textInput
        name: after_hook_name
        label: _("After hook name")
        value: ""
        hint: _("Display name shown in the log output.")
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: custom_hook
      - type: textArea
        name: after_hook_cmd
        label: _("After hook command")
        monospaced: true
        rows: 2
        value: ""
        hint: _("Shell command or script path. Runs after SnapRAID operations complete.")
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: custom_hook

      - type: checkbox
        name: execute_before_spindown
        label: _("Execute after hook before spindown")
        value: false
        hint: _("Run the after hook before spinning down disks instead of after.")
        modifiers:
          - type: disabled
            constraint:
              operator: falsy
              arg0:
                prop: custom_hook
    buttons:
      - template: submit
        execute:
          type: url
          url: "/services/snapraidaio/configs"
      - template: cancel
        execute:
          type: url
          url: "/services/snapraidaio/configs"
